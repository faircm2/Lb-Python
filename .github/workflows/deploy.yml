name: Deploy to Hetzner

on:
  push:
    branches: [ main ]
    paths:
      - 'dashboard/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /opt/lbm/Lb-Python
            git fetch origin main
            git reset --hard origin/main

            # Install/update dashboard dependencies
            /opt/lbm/venv/bin/pip install -r /opt/lbm/Lb-Python/dashboard/requirements.txt -q

            # Restart dashboard (kill old, start new)
            systemctl restart lbm-dashboard
            echo "Dashboard restarted"
